<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="auto">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B091A" />
      <stop offset="50%" stop-color="#141233" />
      <stop offset="100%" stop-color="#1E0B36" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)" rx="15" />

  <!-- Abstract spiking neural paths -->
  <g opacity="0.35">
    <path d="M 100 150 Q 300 80 500 150 T 900 150 T 1100 120" fill="none" stroke="#4F46E5" stroke-width="2" />
    <path d="M 100 120 Q 400 220 700 100 T 1100 180" fill="none" stroke="#8B5CF6" stroke-width="1.5" />
    <path d="M 200 200 C 400 100 800 250 1000 100" fill="none" stroke="#EC4899" stroke-width="1.5" />
    
    <!-- Spiking Nodes -->
    <circle cx="100" cy="150" r="4" fill="#4F46E5" />
    <circle cx="300" cy="107" r="6" fill="#EC4899" filter="url(#glow)" />
    <circle cx="500" cy="150" r="5" fill="#8B5CF6" />
    <circle cx="700" cy="100" r="7" fill="#4F46E5" filter="url(#glow)" />
    <circle cx="900" cy="150" r="4" fill="#EC4899" />
    <circle cx="1100" cy="120" r="5" fill="#8B5CF6" />
    <circle cx="400" cy="172" r="5" fill="#8B5CF6" />
    <circle cx="1000" cy="100" r="6" fill="#EC4899" filter="url(#glow)" />
  </g>

  <!-- Floating brain/neuron icon -->
  <g transform="translate(950, 60)" filter="url(#glow)" opacity="0.8">
    <path d="M 50 80 L 100 50 L 150 80 L 100 110 Z" fill="none" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="100" cy="50" r="8" fill="#EC4899" />
    <circle cx="50" cy="80" r="8" fill="#4F46E5" />
    <circle cx="150" cy="80" r="8" fill="#4F46E5" />
    <circle cx="100" cy="110" r="8" fill="#8B5CF6" />
    <line x1="100" y1="50" x2="100" y2="110" stroke="#EC4899" stroke-width="2" />
    <line x1="50" y1="80" x2="150" y2="80" stroke="#4F46E5" stroke-width="2" />
  </g>

  <!-- Title Text -->
  <text x="80" y="145" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="52" font-weight="900" fill="url(#accentGrad)">
    AWESOME SNNs
  </text>
  <text x="85" y="195" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="500" fill="#94A3B8" letter-spacing="1.5">
    Spiking Neural Networks: Evolution, Models &amp; Applications
  </text>
</svg>
